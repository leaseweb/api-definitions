get:
  description: |
    Get a single dedicated server and its price.
  operationId: getDedicatedServer
  parameters:
    - name: location
      in: query
      required: true
      schema:
        description: The datacenter location
        example: AMS-01
        type: string
    - name: connectedToAggregationPool
      in: query
      required: false
      schema:
        default: 'false'
        description: To add the dedicated server in the connectivity aggregation pool
        example: 'true'
        type: boolean
    - name: contractTerm
      in: query
      required: false
      schema:
        default: 1_YEAR
        description: Order contract term
        example: 3_YEARS
        type: string
        enum:
          - 1_MONTH
          - 3_MONTHS
          - 6_MONTHS
          - 1_YEAR
          - 2_YEARS
          - 3_YEARS
    - name: billingCycle
      in: query
      required: false
      schema:
        default: 1_MONTH
        description: Billing cycle period
        example: 1_MONTH
        type: string
        enum:
          - 1_MONTH
          - 3_MONTHS
          - 6_MONTHS
          - 1_YEAR
    - name: operatingSystem
      in: query
      required: false
      schema:
        description: >-
          Operating system option. Matched case-insensitively and ignoring the
          licensing/core suffix, so "windows server 2022 datacenter" matches
          "Windows Server 2022 Datacenter (2-Cores)".
        example: Windows Server 2022 Datacenter
        type: string
  responses:
    '200':
      content:
        application/json:
          example:
            additionalServices:
              - Monitoring
              - Remote Management
            chassis: Dell R630 (8xSFF)
            controlPanel: No Control Panel
            cpu:
              coresPerCPU: '12'
              totalCores: '24'
              quantity: Dual
              speed: 2,3 GHz
              type: Intel Xeon E5-2670v3
            dataPackConfiguration: 30 TB|Metered|Volume
            ddosIpProtection: DDOS IP Protection Standard
            deliveryMethod: 1 hour
            hdd:
              - amount: '2'
                size: SSD480GB
            id: >-
              WyJERURTRVIwMl9ORVdfT1JERVJfQlVTSU5FU1NfUjYzMC04U0ZGLUU1MjY3MHYzIiwiMiIsIjQ4MEdCIFNTRCBXSSIsIjEyOCBHQiJd
            installOsOnHdd: Set 1
            ipConnectivityType: Direct Connectivity
            ipV4Configuration: 1 x IP V4
            locations:
              - AMS-01
            monitoringType: Leaseweb Monitoring
            name: Dell R630 (8xSFF) 2x Intel Xeon E5-2670v3
            operatingSystem: Windows Server 2025 Standard (2-Cores)
            price:
              currency: EUR
              basePrice: 170.55
              tax: 0
              setupFee: 0
