get:
  description: Show tenant group for the given ObjectStorage product and group id.
  operationId: get/objectStorageGroup
  parameters:
    - $ref: ../components/parameters/objectStorageId.yaml
    - $ref: ../components/parameters/groupId.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/group.yaml
          example:
            displayName: allPowerful
            id: 3f8fad42-73c1-4b5a-9d23-8e1f2c47b890
            s3Policies: null
            uniqueName: group/allPowerful
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get an object storage group
  tags:
    - Object Storage
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/objectStorage_v1_objectStorages_{objectStorageId}_groups_{groupId}/getundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/objectStorage_v1_objectStorages_{objectStorageId}_groups_{groupId}/getundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/objectStorage_v1_objectStorages_{objectStorageId}_groups_{groupId}/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/objectStorage_v1_objectStorages_{objectStorageId}_groups_{groupId}/getundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/objectStorage_v1_objectStorages_{objectStorageId}_groups_{groupId}/getundefined
put:
  description: Update tenant group for the given ObjectStorage product and group id.
  operationId: put/objectStorageGroup
  parameters:
    - $ref: ../components/parameters/objectStorageId.yaml
    - $ref: ../components/parameters/groupId.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/request.schema-5.yaml
        example:
          displayName: testGroup
          s3Policies: >-
            {"Statement": [{"Effect": "Deny","Action": "s3:*","Resource":
            "arn:aws:s3:::*"}]}
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/group.yaml
          example:
            displayName: allPowerful
            id: 3f8fad42-73c1-4b5a-9d23-8e1f2c47b890
            s3Policies: null
            uniqueName: group/allPowerful
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Update an object storage group
  tags:
    - Object Storage
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/objectStorage_v1_objectStorages_{objectStorageId}_groups_{groupId}/putundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/objectStorage_v1_objectStorages_{objectStorageId}_groups_{groupId}/putundefined
    - lang: Php + Http2
