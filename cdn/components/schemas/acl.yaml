properties:
  action:
    type: string
    enum:
      - REJECT
      - ALLOW
    default: REJECT
  value:
    type: string
  type:
    type: string
    enum:
      - IP_ACL
      - GEO_ACL
      - REFERRER_ACL
  id:
    type: string
  policyId:
    type: string
  created:
    type: string
    format: date-time
  updated:
    type:
      - string
      - 'null'
    format: date-time
required:
  - value
  - type
  - id
  - policyId
  - created
type: object
