properties:
  fromTs:
    type: string
    format: date-time
  toTs:
    type: string
    format: date-time
  service:
    type: string
    default: cdn
  granularity:
    type: string
    default: 5MIN
  groupBy:
    type:
      - string
      - 'null'
  distributionId:
    type:
      - string
      - 'null'
  series:
    type:
      - array
      - 'null'
    items:
      title: serie
      type: object
      additionalProperties: true
required:
  - fromTs
  - toTs
  - series
type: object
