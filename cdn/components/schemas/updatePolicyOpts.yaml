properties:
  securityToken:
    type: boolean
    default: false
  securityTokenVendor:
    type:
      - string
      - 'null'
    enum:
      - LEASEWEB
      - null
  securityTokenMethod:
    type:
      - string
      - 'null'
    enum:
      - SIMPLE
      - ENCRYPTED
      - null
  securityTokenSecret:
    type:
      - string
      - 'null'
    maxLength: 125
  securityTokenAesKey:
    type:
      - string
      - 'null'
  securityTokenShaKey:
    type:
      - string
      - 'null'
  securityTokenClientIp:
    type: boolean
    default: false
  securityTokenExpirationParam:
    type:
      - string
      - 'null'
  securityTokenParam:
    type:
      - string
      - 'null'
  securityTokenNumberOfPathComponents:
    type: integer
    minimum: -1
    maximum: 10
    default: -1
  securityTokenEmbedIntoPath:
    type: boolean
    default: false
  securityGeoAcl:
    type: boolean
    default: false
  securityGeoAclDefault:
    type:
      - string
      - 'null'
    enum:
      - ALLOW
      - REJECT
      - null
  securityIpAcl:
    type: boolean
    default: false
  securityIpAclDefault:
    type:
      - string
      - 'null'
    enum:
      - ALLOW
      - REJECT
      - null
  securityReferrerAcl:
    type: boolean
    default: false
  securityReferrerAclDefault:
    type:
      - string
      - 'null'
    enum:
      - ALLOW
      - REJECT
      - null
  originPullProtocol:
    type: string
    enum:
      - HTTP
      - HTTPS
    default: HTTP
  originPullCompressed:
    type:
      - boolean
      - 'null'
  originPullHostHeader:
    type:
      - string
      - 'null'
  originPullId:
    type:
      - string
      - 'null'
  originPullGroupId:
    type:
      - string
      - 'null'
  originPullShieldId:
    type:
      - string
      - 'null'
  originPullXff:
    type: boolean
    default: false
  originPullPassCookie:
    type: boolean
    default: false
  originPullPassVary:
    type: boolean
    default: false
  cacheQueryString:
    type: boolean
    default: false
  cacheDefaultTtl:
    type:
      - integer
      - 'null'
  cacheHonorOriginTtl:
    type: boolean
    default: false
  cacheStale:
    type: boolean
    default: false
  cacheByPass:
    type: boolean
    default: false
  cacheSegmented:
    type: boolean
    default: true
  deliveryTtlInherit:
    type: boolean
    default: false
  deliveryTtlOverride:
    type: integer
    default: 0
  deliveryCompress:
    type: boolean
    default: false
  deliveryRateLimit:
    type: boolean
    default: false
  deliveryTransferRate:
    type:
      - integer
      - 'null'
  deliveryBurstSize:
    type:
      - integer
      - 'null'
  deliveryForceHttps:
    type: boolean
    default: false
  deliveryPassThroughAllHeaders:
    type: boolean
    default: false
  description:
    type: string
  allowedMethods:
    default: GET,HEAD
    type:
      - string
      - 'null'
  path:
    type: string
    default: /
type: object
