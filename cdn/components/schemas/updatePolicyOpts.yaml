properties:
  securityToken:
    type: boolean
    default: false
  securityTokenVendor:
    anyOf:
      - type: string
        enum:
          - LEASEWEB
      - type: 'null'
  securityTokenMethod:
    anyOf:
      - type: string
        enum:
          - SIMPLE
          - ENCRYPTED
      - type: 'null'
  securityTokenSecret:
    anyOf:
      - type: string
      - type: 'null'
    maxLength: 125
  securityTokenAesKey:
    anyOf:
      - type: string
      - type: 'null'
  securityTokenShaKey:
    anyOf:
      - type: string
      - type: 'null'
  securityTokenClientIp:
    type: boolean
    default: false
  securityTokenExpirationParam:
    anyOf:
      - type: string
      - type: 'null'
  securityTokenParam:
    anyOf:
      - type: string
      - type: 'null'
  securityTokenNumberOfPathComponents:
    type: integer
    minimum: -1
    maximum: 10
    default: -1
  securityTokenEmbedIntoPath:
    type: boolean
    default: false
  securityGeoAcl:
    type: boolean
    default: false
  securityGeoAclDefault:
    anyOf:
      - type: string
        enum:
          - ALLOW
          - REJECT
      - type: 'null'
  securityIpAcl:
    type: boolean
    default: false
  securityIpAclDefault:
    anyOf:
      - type: string
        enum:
          - ALLOW
          - REJECT
      - type: 'null'
  securityReferrerAcl:
    type: boolean
    default: false
  securityReferrerAclDefault:
    anyOf:
      - type: string
        enum:
          - ALLOW
          - REJECT
      - type: 'null'
  originPullProtocol:
    type: string
    enum:
      - HTTP
      - HTTPS
    default: HTTP
  originPullCompressed:
    anyOf:
      - type: boolean
      - type: 'null'
  originPullHostHeader:
    anyOf:
      - type: string
      - type: 'null'
  originPullId:
    anyOf:
      - type: string
      - type: 'null'
  originPullGroupId:
    anyOf:
      - type: string
      - type: 'null'
  originPullShieldId:
    anyOf:
      - type: string
      - type: 'null'
  originPullXff:
    type: boolean
    default: false
  originPullPassCookie:
    type: boolean
    default: false
  originPullPassVary:
    type: boolean
    default: false
  cacheQueryString:
    type: boolean
    default: false
  cacheDefaultTtl:
    anyOf:
      - type: integer
      - type: 'null'
  cacheHonorOriginTtl:
    type: boolean
    default: false
  cacheStale:
    type: boolean
    default: false
  cacheByPass:
    type: boolean
    default: false
  cacheSegmented:
    type: boolean
    default: true
  deliveryTtlInherit:
    type: boolean
    default: false
  deliveryTtlOverride:
    type: integer
    default: 0
  deliveryCompress:
    type: boolean
    default: false
  deliveryRateLimit:
    type: boolean
    default: false
  deliveryTransferRate:
    anyOf:
      - type: integer
      - type: 'null'
  deliveryBurstSize:
    anyOf:
      - type: integer
      - type: 'null'
  deliveryForceHttps:
    type: boolean
    default: false
  deliveryPassThroughAllHeaders:
    type: boolean
    default: false
  description:
    type: string
  allowedMethods:
    default: GET,HEAD
    anyOf:
      - type: string
      - type: 'null'
  path:
    type: string
    default: /
type: object
