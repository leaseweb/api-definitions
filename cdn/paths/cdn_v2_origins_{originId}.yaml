parameters:
  - $ref: ../components/parameters/originId.yaml
get:
  description: |
    Get an origin.
  operationId: getOrigin
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/originResource.yaml
          examples:
            SimpleOrigin:
              $ref: ../components/examples/simpleOriginResult.yaml
            AdvancedOrigin:
              $ref: ../components/examples/advancedOriginResult.yaml
            ObjectStorageOrigin:
              $ref: ../components/examples/objectStorageOriginResult.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get origin
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_origins_{originId}/getundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_origins_{originId}/getundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_origins_{originId}/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_origins_{originId}/getundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_origins_{originId}/getundefined
put:
  description: >
    Update an origin.


    Refer to the "Create origin" endpoint for a description of the available
    data fields.


    The type of the origin can't be changed since it's considered a different
    type of entity.
  operationId: updateOrigin
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/originResource.yaml
        examples:
          SimpleOrigin:
            $ref: ../components/examples/simpleOriginOpts.yaml
          AdvancedOrigin:
            $ref: ../components/examples/advancedOriginOpts.yaml
          ObjectStorageOrigin:
            $ref: ../components/examples/objectStorageOriginOpts.yaml
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/originResource.yaml
          examples:
            SimpleOrigin:
              $ref: ../components/examples/simpleOriginResult.yaml
            AdvancedOrigin:
              $ref: ../components/examples/advancedOriginResult.yaml
            ObjectStorageOrigin:
              $ref: ../components/examples/objectStorageOriginResult.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '422':
      $ref: ../components/responses/422.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Update origin
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_origins_{originId}/putundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_origins_{originId}/putundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_origins_{originId}/putundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_origins_{originId}/putundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_origins_{originId}/putundefined
