parameters:
  - $ref: ../components/parameters/originId.yaml
get:
  description: |
    Get an origin by its ID.
  operationId: getOrigin
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
            data:
              - key: id
                value: or-5dfg51fr
              - key: customerId
                value: cu-sndj3j24
              - key: created
                value: '2024-07-12T12:55:54'
              - key: updated
                value: '2024-07-12T12:55:54'
              - key: host
                value: backend.leaseweb.com
              - key: description
                value: Leaseweb Backend
              - key: enabled
                value: true
            resourceType: SIMPLE_ORIGIN
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get Origin By Id
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_origins_{originId}/getundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_origins_{originId}/getundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_origins_{originId}/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_origins_{originId}/getundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_origins_{originId}/getundefined
put:
  description: >
    Update the options available in an origin.


    Note: Type of the origin can't be changed since it's considered a different
    type of entity.
  operationId: updateOrigin
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/resource.yaml
        example:
          data:
            - key: host
              value: backend.leaseweb.com
            - key: description
              value: Leaseweb Backend 2
            - key: enabled
              value: true
          resourceType: SIMPLE_ORIGIN
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
            data:
              - key: id
                value: or-5dfg51fr
              - key: customerId
                value: cu-sndj3j24
              - key: created
                value: '2024-07-12T12:55:54'
              - key: updated
                value: '2024-07-12T12:55:54'
              - key: host
                value: backend.leaseweb.com
              - key: description
                value: Leaseweb Backend 2
              - key: enabled
                value: true
            resourceType: SIMPLE_ORIGIN
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '422':
      $ref: ../components/responses/422.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Update Origin By Id
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_origins_{originId}/putundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_origins_{originId}/putundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_origins_{originId}/putundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_origins_{originId}/putundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_origins_{originId}/putundefined
