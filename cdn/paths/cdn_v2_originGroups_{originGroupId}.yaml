parameters:
  - $ref: ../components/parameters/originGroupId.yaml
get:
  description: |
    Get the details of an origin group by its ID.
  operationId: getOriginGroup
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
            data:
              - key: balancingMethod
                value: CONSISTENT
              - key: description
                value: LSW Origin Group
              - key: failTimeOut
                value: 8
              - key: keepAlive
                value: true
              - key: keepAliveSeconds
                value: 27
              - key: enabled
                value: true
              - key: id
                value: og-3h47bjs
              - key: customerId
                value: cu-47dbh4n2
              - key: created
                value: '2024-08-07T10:38:49'
              - key: updated
                value: null
            resourceType: ORIGIN_GROUP
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get Origin Group By Id
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_originGroups_{originGroupId}/getundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_originGroups_{originGroupId}/getundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/cdn_v2_originGroups_{originGroupId}/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_originGroups_{originGroupId}/getundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/cdn_v2_originGroups_{originGroupId}/getundefined
put:
  description: |
    Update the parameters in an origin group.

    Note: members are managed by another endpoint.
  operationId: updateOriginGroup
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/resource.yaml
        example:
          data:
            - key: balancingMethod
              value: CONSISTENT
            - key: description
              value: LSW Origin Group 2
            - key: failTimeOut
              value: 8
            - key: keepAlive
              value: true
            - key: keepAliveSeconds
              value: 27
            - key: enabled
              value: true
          resourceType: ORIGIN_GROUP
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
            data:
