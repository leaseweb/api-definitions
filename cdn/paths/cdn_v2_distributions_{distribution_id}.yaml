              - key: enabled
                value: true
              - key: ipv6
                value: false
              - key: tls
                value: false
              - key: tlsType
                value: null
              - key: certificateId
                value: null
              - key: logging
                value: false
              - key: id
                value: di-6wnk5n2b
              - key: customerId
                value: cu-27h4kb2v
              - key: created
                value: '2024-08-07T10:25:00'
              - key: updated
                value: '2024-08-07T10:25:00'
            resourceType: DISTRIBUTION_VOLUME
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
