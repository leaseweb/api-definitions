      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_distributions_{distribution_id}/getundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_distributions_{distribution_id}/getundefined
    - lang: Php + Http2
      source:
