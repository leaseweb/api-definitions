put:
  description: >
    Update a distribution


    After a successful call, the changes you made exists only in a pending
    state.

    To make it propagated across our network you must subsequently invoke the
    Push Distribution endpoint for the related distribution.

    Failure to call the Push Distribution endpoint will leave the resource
    unavailable for your service.
  operationId: updateDistribution
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/resource.yaml
        example:
          data:
            - key: description
              value: Test Volume Distribution 2
            - key: enabled
              value: true
            - key: ipv6
              value: false
            - key: tls
              value: false
            - key: tlsType
              value: null
            - key: certificateId
              value: null
            - key: logging
              value: false
          resourceType: DISTRIBUTION_VOLUME
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
