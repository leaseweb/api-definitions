parameters:
  - $ref: ../components/parameters/distributionId.yaml
get:
  description: |
    Get the general details of a distribution by its ID.
  operationId: getDistribution
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
            data:
              - key: description
                value: Test Volume Distribution
              - key: enabled
                value: true
              - key: ipv6
                value: false
              - key: tls
                value: false
              - key: tlsType
                value: null
              - key: certificateId
                value: null
              - key: logging
                value: false
              - key: id
                value: di-6wnk5n2b
              - key: customerId
                value: cu-27h4kb2v
              - key: created
                value: '2024-08-07T10:25:00'
              - key: updated
                value: null
            resourceType: DISTRIBUTION_VOLUME
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get Distribution By Id
  tags:
    - CDN
  x-codeSamples:
