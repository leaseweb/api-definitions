post:
  description: |
    Create origin resource to be used within distributions.

    There are 2 types of origins:

    - SIMPLE_ORIGIN
    - ADVANCED_ORIGIN
    - OBJECT_STORAGE_ORIGIN
  operationId: createOrigin
  requestBody:
    description: ''
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/resource.yaml
        example:
          data:
            - key: host
              value: backend.leaseweb.com
            - key: description
              value: Leaseweb Backend
            - key: enabled
              value: true
          resourceType: SIMPLE_ORIGIN
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
            data:
              - key: id
                value: or-4njkb2g
              - key: customerId
                value: cu-sndj3j24
              - key: created
                value: '2024-07-12T12:55:54'
              - key: updated
                value: '2024-07-12T12:55:54'
              - key: host
                value: backend.leaseweb.com
              - key: description
                value: Leaseweb Backend
              - key: enabled
                value: true
            resourceType: SIMPLE_ORIGIN
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '422':
      $ref: ../components/responses/422.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Create Origin
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_origins/postundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_origins/postundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_origins/postundefined
    - lang: Javascript + Jquery
      source:
        $ref: ../code_samples/Javascript+Jquery/cdn_v2_origins/postundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_origins/postundefined
get:
  description: >
    Get the list of origins including all of the origin types. Types are
    specified in each record.
  operationId: getOrigins
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/getOriginsResult.yaml
          example:
            _metadata:
              totalCount: 2
              limit: 20
              offset: 0
            origins:
              - resourceType: SIMPLE_ORIGIN
                data:
                  - key: id
                    value: or-5dfg51fr
                  - key: customerId
                    value: cu-sndj3j24
                  - key: created
                    value: '2024-07-12T12:55:54'
                  - key: updated
                    value: '2024-07-12T12:55:54'
                  - key: host
                    value: backend.leaseweb.com
                  - key: description
                    value: Leaseweb Backend
                  - key: enabled
                    value: true
              - resourceType: ADVANCED_ORIGIN
                data:
                  - key: id
                    value: or-y71sg45
                  - key: customerId
                    value: cu-sndj3j24
                  - key: created
                    value: '2020-12-10T07:07:35'
                  - key: updated
                    value: '2021-12-08T12:20:25'
                  - key: host
                    value: backend.leaseweb.com
                  - key: description
                    value: LSW Custom Backend
                  - key: enabled
                    value: true
                  - key: path
                    value: /test
                  - key: httpPort
                    value: 8080
                  - key: httpsPort
                    value: 8081
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get All Origins
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_origins/getundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_origins/getundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_origins/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: ../code_samples/Javascript+Jquery/cdn_v2_origins/getundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_origins/getundefined
