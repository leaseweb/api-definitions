parameters:
  - $ref: ../components/parameters/originGroupId.yaml
  - $ref: ../components/parameters/originGroupMemberId.yaml
get:
  description: |
    Get an origin group member.
  operationId: getOriginGroupMember
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/originGroupMemberResource.yaml
          example:
            data:
              - key: id
                value: or-6j2vgb3
              - key: originGroupId
                value: og-3h47bjs
              - key: originId
                value: or-du7n2vo8
              - key: status
                value: ACTIVE
              - key: originHost
                value: origin.leaseweb.com
              - key: created
                value: '2026-03-11T16:34:22Z'
              - key: updated
                value: '2026-06-01T15:04:03Z'
            resourceType: ORIGIN_GROUP_MEMBER
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get origin group member
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_originGroups_{originGroupId}_members_{originGroupMemberId}/getundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_originGroups_{originGroupId}_members_{originGroupMemberId}/getundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/cdn_v2_originGroups_{originGroupId}_members_{originGroupMemberId}/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_originGroups_{originGroupId}_members_{originGroupMemberId}/getundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/cdn_v2_originGroups_{originGroupId}_members_{originGroupMemberId}/getundefined
put:
  description: >
    Update an origin group member.


    Refer to the "Create origin group member" endpoint for a description of the
    available data fields.
  operationId: updateOriginGroupMember
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/originGroupMemberResource.yaml
        example:
          data:
            - key: originId
              value: or-du7n2vo8
            - key: status
              value: ACTIVE
          resourceType: ORIGIN_GROUP_MEMBER
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/originGroupMemberResource.yaml
          example:
            data:
              - key: id
                value: or-6j2vgb3
              - key: originGroupId
                value: og-3h47bjs
              - key: originId
                value: or-du7n2vo8
              - key: status
                value: ACTIVE
              - key: originHost
                value: origin.leaseweb.com
              - key: created
                value: '2026-03-11T16:34:22Z'
              - key: updated
                value: '2026-06-01T15:04:03Z'
            resourceType: ORIGIN_GROUP_MEMBER
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '422':
      $ref: ../components/responses/422.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Update origin group member
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_originGroups_{originGroupId}_members_{originGroupMemberId}/putundefined
    - lang: Python + Python3
      source:
        $ref: >-
