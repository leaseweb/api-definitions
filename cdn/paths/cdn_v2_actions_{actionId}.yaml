parameters:
  - $ref: ../components/parameters/actionId.yaml
get:
  description: |
    Get an action by ID to monitor the progress.
  operationId: getAction
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/action.yaml
          example:
            created: '2019-08-24T14:15:22Z'
            customerId: '215468472'
            id: 50ea5204-4827-41d2-a940-cb5afdfb2426
            resource:
              invalidationId: in-80ot20ls
              status: FINISHED
              urlStatus:
                - url: https://cdn-assets.leaseweb.com/logo.png
                  distributionGroupId: ''
                  status: SUCCESS
                  message: ''
              submitted: '2024-07-10T13:11:12'
              completed: null
            status: PENDING
            type: INVALIDATION
            updated: '2019-08-24T14:15:22Z'
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get Action By Id
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_actions_{actionId}/getundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_actions_{actionId}/getundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_actions_{actionId}/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_actions_{actionId}/getundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_actions_{actionId}/getundefined
