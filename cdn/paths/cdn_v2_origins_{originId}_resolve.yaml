parameters:
  - $ref: ../components/parameters/originId.yaml
get:
  description: |
    Validate if an origin can be resolved
  operationId: resolveOrigin
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resolveOriginResult.yaml
          example:
            resolved: true
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Validate If Origin Can Be Resolved
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_origins_{originId}_resolve/getundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_origins_{originId}_resolve/getundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/cdn_v2_origins_{originId}_resolve/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_origins_{originId}_resolve/getundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/cdn_v2_origins_{originId}_resolve/getundefined
