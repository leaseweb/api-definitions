parameters:
  - $ref: ../components/parameters/distributionId.yaml
  - $ref: ../components/parameters/policyId.yaml
post:
  description: >
    Create an ACL to control the traffic to a policy.


    There are 3 types of ACLs:


    - IP_ACL: Reject or allow certain IP subnets.

    - GEO_ACL: Reject or allow certain countries.

    - REFERRER_ACL: Reject or allow certain referrers.


    After a successful call, the changes you made exists only in a pending
    state.

    To make it propagated across our network you must subsequently invoke the
    Push Distribution endpoint for the related distribution.

    Failure to call the Push Distribution endpoint will leave the resource
    unavailable for your service.
  operationId: createAcl
  requestBody:
    description: ''
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/createAclOpts.yaml
        example:
          action: REJECT
          type: IP_ACL
          value: 1.1.1.5/32
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/acl.yaml
          example:
            action: REJECT
            created: '2024-08-06T08:55:37'
            id: iacl-2
            policyId: po-wk0ksi0x
            type: IP_ACL
            updated: '2024-08-07T23:31:44'
            value: 1.1.1.5/32
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Create Acl
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls/postundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls/postundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls/postundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls/postundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls/postundefined
get:
  description: |
    Get the list of active ACLs in a policy.
  operationId: getAcls
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/getAclsResult.yaml
          example:
            _metadata:
              totalCount: 3
              limit: 10
              offset: 0
            acls:
              - action: REJECT
                value: 1.1.1.2/32
                type: IP_ACL
                id: iacl-0
                policyId: po-wk0ksi0x
                created: '2024-08-06T08:55:37'
                updated: '2024-08-07T23:31:44'
              - action: REJECT
                value: 1.1.1.3/32
                type: IP_ACL
                id: iacl-1
                policyId: po-wk0ksi0x
                created: '2024-08-06T08:55:37'
                updated: '2024-08-07T23:31:44'
              - action: REJECT
                value: 1.1.1.5/32
                type: IP_ACL
                id: iacl-2
                policyId: po-wk0ksi0x
                created: '2024-08-06T08:55:37'
                updated: '2024-08-07T23:31:44'
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get All Acls
  tags:
    - CDN
  x-codeSamples:
