post:
  description: >
    Create any kind of distribution using this endpoint.


    Available distribution types:


    - MULTI_CDN_VOLUME

    - MULTI_CDN_PREMIUM

    - SHIELD_CDN


    After a successful call, the changes you made exists only in a pending
    state.

    To make it propagated across our network you must subsequently invoke the
    Push Distribution endpoint for the related distribution.

    Failure to call the Push Distribution endpoint will leave the resource
    unavailable for your service.
  operationId: createDistribution
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/resource.yaml
        example:
          data:
            - key: description
              value: Test Volume Distribution
            - key: enabled
              value: true
            - key: tls
              value: false
          resourceType: MULTI_CDN_VOLUME
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
            data:
              - key: description
                value: Test Volume Distribution
              - key: enabled
                value: true
              - key: ipv6
                value: false
              - key: tls
                value: false
              - key: tlsType
                value: null
              - key: certificateId
                value: null
              - key: logging
                value: false
              - key: id
                value: di-6wnk5n2b
              - key: customerId
                value: cu-27h4kb2v
              - key: created
                value: '2024-08-07T10:25:00'
              - key: updated
                value: null
            resourceType: DISTRIBUTION_VOLUME
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '422':
      $ref: ../components/responses/422.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Create Distribution
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_distributions/postundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_distributions/postundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_distributions/postundefined
    - lang: Javascript + Jquery
      source:
        $ref: ../code_samples/Javascript+Jquery/cdn_v2_distributions/postundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_distributions/postundefined
get:
  description: |
    Get the list of your distributions.
  operationId: getDistributions
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/getDistributionsResult.yaml
          example:
            _metadata:
              totalCount: 1
              limit: 25
              offset: 0
            distributions:
              - resourceType: DISTRIBUTION_VOLUME
                data:
                  - key: description
                    value: Test Distribution
                  - key: enabled
                    value: true
                  - key: ipv6
                    value: true
                  - key: tls
                    value: false
                  - key: tlsType
                    value: null
                  - key: certificateId
                    value: null
                  - key: logging
                    value: true
                  - key: id
                    value: di-dkn3lb5vc
                  - key: customerId
                    value: cu-8smmd9n
                  - key: created
                    value: '2020-11-03T12:04:43'
                  - key: updated
                    value: '2024-02-22T20:29:14'
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get All Distributions
  tags:
    - CDN
  x-codeSamples:
