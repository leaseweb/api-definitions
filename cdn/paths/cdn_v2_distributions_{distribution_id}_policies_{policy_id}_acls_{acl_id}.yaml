parameters:
  - $ref: ../components/parameters/distributionId.yaml
  - $ref: ../components/parameters/policyId.yaml
  - $ref: ../components/parameters/aclId.yaml
get:
  description: |
    Get an ACL by its ID.
  operationId: getAcl
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/acl.yaml
          example:
            action: REJECT
            created: '2024-08-06T08:55:37'
            id: iacl-2
            policyId: po-wk0ksi0x
            type: IP_ACL
            updated: '2024-08-07T23:31:44'
            value: 1.1.1.5/32
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get Acl By Id
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls_{acl_id}/getundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls_{acl_id}/getundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls_{acl_id}/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls_{acl_id}/getundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/cdn_v2_distributions_{distribution_id}_policies_{policy_id}_acls_{acl_id}/getundefined
delete:
  description: >
    Delete an ACL by its ID


    After a successful call, the changes you made exists only in a pending
    state.

    To make it propagated across our network you must subsequently invoke the
    Push Distribution endpoint for the related distribution.

    Failure to call the Push Distribution endpoint will leave the resource
    unavailable for your service.
  operationId: deleteAcl
  responses:
    '204':
      $ref: ../components/responses/204.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
