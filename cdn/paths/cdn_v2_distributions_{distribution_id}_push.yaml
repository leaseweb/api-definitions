post:
  tags:
    - CDN
  summary: Push Distribution
  description: >-
    Trigger propagation across our network. Your Multi-CDN will become available
    once the propagation has completed.
  operationId: push_distribution_v1_distributions__distribution_id__push_post
  parameters:
    - name: distribution_id
      in: path
      required: true
      schema:
        type: string
        title: Distribution Id
  responses:
    '202':
      description: >-
        The request has been accepted. The changes are being propagated and your
        Multi-CDN will be available in a few minutes.
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_distributions_{distribution_id}_push/postundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_distributions_{distribution_id}_push/postundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/cdn_v2_distributions_{distribution_id}_push/postundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_distributions_{distribution_id}_push/postundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/cdn_v2_distributions_{distribution_id}_push/postundefined
