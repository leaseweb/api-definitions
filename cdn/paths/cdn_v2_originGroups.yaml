post:
  description: >
    Create an origin group.



    ### Request data fields


    | name             | type    | nullable | required | default |

    |------------------|---------|----------|----------|---------|

    | balancingMethod  | string  | false    | yes      |         |

    | description      | string  | true     | no       | null    |

    | failTimeOut      | integer | false    | no       | 5       |

    | keepAlive        | boolean | false    | no       | false   |

    | keepAliveSeconds | integer | false    | no       | 5       |

    | enabled          | boolean | false    | no       | true    |


    Available load balancing methods:


    - ROUNDROBIN

    - CONSISTENT

    - STICKY

    - FAILOVER



    ### Response data fields


    Here are the data fields present in the response only.


    | name       | type   | nullable |

    |------------|--------|----------|

    | id         | string | false    |

    | customerId | string | false    |

    | salesOrgId | string | false    |

    | created    | string | false    |

    | updated    | string | true     |


    All the request fields are present in the response (even the ones not
    required for the request)


    More information can be found in the [Knowledge
    Base](https://kb.leaseweb.com/kb/multi-cdn/multi-cdn-origins/)
  operationId: createOriginGroup
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/originGroupResource.yaml
        example:
          data:
            - key: balancingMethod
              value: CONSISTENT
            - key: description
              value: LSW Origin Group
            - key: failTimeOut
              value: 8
            - key: keepAlive
              value: true
            - key: keepAliveSeconds
              value: 27
            - key: enabled
              value: true
          resourceType: ORIGIN_GROUP
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/originGroupResource.yaml
          example:
            data:
              - key: balancingMethod
                value: CONSISTENT
              - key: description
                value: LSW Origin Group
              - key: failTimeOut
                value: 8
              - key: keepAlive
                value: true
              - key: keepAliveSeconds
                value: 27
              - key: enabled
                value: true
              - key: id
                value: og-3h47bjs
              - key: customerId
                value: cu-47dbh4n2
              - key: salesOrgId
                value: '2000'
              - key: created
                value: '2024-08-07T10:38:49Z'
              - key: updated
                value: null
            resourceType: ORIGIN_GROUP
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '422':
      $ref: ../components/responses/422.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Create origin group
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_originGroups/postundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_originGroups/postundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_originGroups/postundefined
    - lang: Javascript + Jquery
      source:
        $ref: ../code_samples/Javascript+Jquery/cdn_v2_originGroups/postundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_originGroups/postundefined
