post:
  description: |+
    Using origin groups you can define loadbalancers on top of your origins. 

    Available loadbalancing methods:

    - ROUNDROBIN
    - CONSISTENT
    - STICKY
    - FAILOVER

  operationId: createOriginGroup
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/resource.yaml
        example:
          data:
            - key: balancingMethod
              value: CONSISTENT
            - key: description
              value: LSW Origin Group
            - key: failTimeOut
              value: 8
            - key: keepAlive
              value: true
            - key: keepAliveSeconds
              value: 27
            - key: enabled
              value: true
          resourceType: ORIGIN_GROUP
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/resource.yaml
          example:
            data:
              - key: balancingMethod
                value: CONSISTENT
              - key: description
                value: LSW Origin Group
              - key: failTimeOut
                value: 8
              - key: keepAlive
                value: true
              - key: keepAliveSeconds
                value: 27
              - key: enabled
                value: true
              - key: id
                value: og-3h47bjs
              - key: customerId
                value: cu-47dbh4n2
              - key: created
                value: '2024-08-07T10:38:49'
              - key: updated
                value: null
            resourceType: ORIGIN_GROUP
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '422':
      $ref: ../components/responses/422.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Create Origin Group
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: ../code_samples/Shell+Curl/cdn_v2_originGroups/postundefined
    - lang: Python + Python3
      source:
        $ref: ../code_samples/Python+Python3/cdn_v2_originGroups/postundefined
    - lang: Php + Http2
      source:
        $ref: ../code_samples/Php+Http2/cdn_v2_originGroups/postundefined
    - lang: Javascript + Jquery
      source:
        $ref: ../code_samples/Javascript+Jquery/cdn_v2_originGroups/postundefined
    - lang: Go + Native
      source:
        $ref: ../code_samples/Go+Native/cdn_v2_originGroups/postundefined
get:
  description: |
    Get the list of your origin groups.
  operationId: getOriginGroups
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/getOriginGroupsResult.yaml
          example:
            _metadata:
              totalCount: 2
              limit: 25
              offset: 0
            originGroups:
              - resourceType: ORIGIN_GROUP
