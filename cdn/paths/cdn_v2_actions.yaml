get:
  description: >
    Get the list of all of the actions to monitor the progress of your
    background jobs.
  operationId: getActions
  parameters:
    - name: filters
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            - INVALIDATION
            - CREATE_DIST
            - UPDATE_DIST
            - DELETE_DIST
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/getActionsResult.yaml
          example:
            _metadata:
              totalCount: 2
              limit: 10
              offset: 0
            actions:
              - type: INVALIDATION
                resource:
                  invalidationId: in-gt7m1s5
                  status: FINISHED
                  urlStatus:
                    - url: https://cdn-assets.leaseweb.com/styles.css
                      distributionGroupId: ''
                      status: SUCCESS
                      message: ''
                  submitted: '2024-07-10T13:10:14'
                  completed: null
                status: FINISHED
                id: dac57900-0109-4615-b808-003f2c07cb40
                customerId: '59841258'
                created: '2024-07-10T13:10:15Z'
                updated: '2024-08-08T12:52:09Z'
              - type: INVALIDATION
                resource:
                  invalidationId: in-80ot20ls
                  status: FINISHED
                  urlStatus:
                    - url: https://cdn-assets.leaseweb.com/logo.png
                      distributionGroupId: ''
                      status: SUCCESS
                      message: ''
                  submitted: '2024-07-10T13:11:12'
                  completed: null
                status: FINISHED
                id: 755ad32d-264d-4ace-bd4c-c30399c71675
                customerId: '59841258'
                created: '2024-07-10T13:11:13Z'
                updated: '2024-08-08T12:52:09Z'
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get All Actions
  tags:
    - CDN
