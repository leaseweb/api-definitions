parameters:
  - $ref: ../components/parameters/distributionId.yaml
  - $ref: ../components/parameters/domainId.yaml
get:
  description: |
    Get the details of a custom domain attached to a dsitribution.
  operationId: getDomain
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/domain.yaml
          example:
            created: '2024-07-31T02:15:32'
            distributionId: di-yt84vrj
            domain: test2.com
            id: test2.com
            updated: '2024-08-04T23:24:29'
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Get Domain By Id
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_distributions_{distribution_id}_domains_{domain_id}/getundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_distributions_{distribution_id}_domains_{domain_id}/getundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/cdn_v2_distributions_{distribution_id}_domains_{domain_id}/getundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_distributions_{distribution_id}_domains_{domain_id}/getundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/cdn_v2_distributions_{distribution_id}_domains_{domain_id}/getundefined
delete:
  description: >
    Delete a domain by its ID


    After a successful call, the changes you made exists only in a pending
    state.

    To make it propagated across our network you must subsequently invoke the
    Push Distribution endpoint for the related distribution.

    Failure to call the Push Distribution endpoint will leave the resource
    unavailable for your service.
  operationId: deleteDomain
  responses:
    '204':
      $ref: ../components/responses/204.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Delete Domain By Id
  tags:
    - CDN
  x-codeSamples:
