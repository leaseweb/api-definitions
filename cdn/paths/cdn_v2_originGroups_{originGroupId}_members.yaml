parameters:
  - $ref: ../components/parameters/originGroupId.yaml
post:
  description: >
    Add an origin as member to an origin group.


    ### Request data fields


    | name     | type   | nullable | required | default |

    |----------|--------|----------|----------|---------|

    | originId | string | false    | yes      |         |

    | status   | string | false    | no       | ACTIVE  |


    Available status:


    - ACTIVE

    - BACKUP



    ### Response data fields


    Here are the data fields present in the response only.


    | name          | type   | nullable |

    |---------------|--------|----------|

    | id            | string | false    |

    | originGroupId | string | false    |

    | created       | string | false    |

    | updated       | string | true     |


    All the request fields are present in the response (even the ones not
    required for the request)


    More information can be found in the [Knowledge
    Base](https://kb.leaseweb.com/kb/multi-cdn/multi-cdn-origins/)
  operationId: createOriginGroupMember
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/originGroupMemberResource.yaml
        example:
          data:
            - key: originId
              value: or-du7n2vo8
            - key: status
              value: ACTIVE
          resourceType: ORIGIN_GROUP_MEMBER
  responses:
    '201':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/originGroupMemberResource.yaml
          example:
            data:
              - key: id
                value: or-6j2vgb3
              - key: originGroupId
                value: og-3h47bjs
              - key: originId
                value: or-du7n2vo8
              - key: status
                value: ACTIVE
              - key: originHost
                value: origin.leaseweb.com
              - key: created
                value: '2026-03-11T16:34:22Z'
              - key: updated
                value: '2026-06-01T15:04:03Z'
            resourceType: ORIGIN_GROUP_MEMBER
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '422':
      $ref: ../components/responses/422.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: Create origin group member
  tags:
    - CDN
  x-codeSamples:
    - lang: Shell + Curl
      source:
        $ref: >-
          ../code_samples/Shell+Curl/cdn_v2_originGroups_{originGroupId}_members/postundefined
    - lang: Python + Python3
      source:
        $ref: >-
          ../code_samples/Python+Python3/cdn_v2_originGroups_{originGroupId}_members/postundefined
    - lang: Php + Http2
      source:
        $ref: >-
          ../code_samples/Php+Http2/cdn_v2_originGroups_{originGroupId}_members/postundefined
    - lang: Javascript + Jquery
      source:
        $ref: >-
          ../code_samples/Javascript+Jquery/cdn_v2_originGroups_{originGroupId}_members/postundefined
    - lang: Go + Native
      source:
        $ref: >-
          ../code_samples/Go+Native/cdn_v2_originGroups_{originGroupId}_members/postundefined
get:
  description: |
    List all the members of an origin group.
  operationId: getOriginGroupMembers
  parameters:
    - $ref: ../components/parameters/limit.yaml
    - $ref: ../components/parameters/offset.yaml
  responses:
    '200':
      description: Successful Response
      content:
        application/json:
          schema:
            $ref: ../components/schemas/getOriginGroupMembersResult.yaml
          example:
            _metadata:
              totalCount: 2
              limit: 25
              offset: 0
            originGroupMembers:
              - resourceType: ORIGIN_GROUP_MEMBER
                data:
                  - key: originGroupId
                    value: ec2c3826-8cf1-4817-9750-732b400ee65b
                  - key: originId
                    value: og-3h47bjs
                  - key: status
                    value: ACTIVE
                  - key: id
                    value: or-g2n6l2v5
                  - key: originHost
                    value: origin1.leaseweb.com
                  - key: created
                    value: '2026-03-11T16:34:22Z'
                  - key: updated
                    value: '2026-06-01T15:04:03Z'
              - resourceType: ORIGIN_GROUP_MEMBER
                data:
                  - key: originGroupId
                    value: og-3h47bjs
                  - key: originId
                    value: or-du7n2vo8
                  - key: status
                    value: BACKUP
                  - key: id
                    value: or-kn6l2bb5
                  - key: originHost
                    value: origin2.leaseweb.com
                  - key: created
                    value: '2026-03-11T16:34:22Z'
                  - key: updated
                    value: null
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '500':
      $ref: ../components/responses/500.yaml
    '503':
      $ref: ../components/responses/503.yaml
  summary: List origin group members
  tags:
    - CDN
