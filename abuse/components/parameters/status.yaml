name: status
in: query
required: false
schema:
  type: string
  enum:
    - OPEN
    - WAITING
    - CLOSED
example: OPEN,CLOSED
description: >
  Filter reports by their status (`?status=OPEN,CLOSED`): returns reports that
  have any of the listed statuses. Defaults to `OPEN,WAITING,CLOSED` if not
  provided.
